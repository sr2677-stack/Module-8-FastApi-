name: FastAPI CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Detect project directory
      id: project
      shell: bash
      run: |
        if [ -f "requirements.txt" ] && [ -d "app" ] && [ -d "tests" ]; then
          echo "dir=." >> "$GITHUB_OUTPUT"
        elif [ -f "fastapi-calculator/requirements.txt" ] && [ -d "fastapi-calculator/app" ] && [ -d "fastapi-calculator/tests" ]; then
          echo "dir=fastapi-calculator" >> "$GITHUB_OUTPUT"
        else
          echo "Could not find project directory containing requirements.txt, app/, and tests/"
          exit 1
        fi

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r "${{ steps.project.outputs.dir }}/requirements.txt"

    - name: Run tests
      shell: bash
      env:
        PYTHONPATH: ${{ github.workspace }}/${{ steps.project.outputs.dir }}
      run: |
        python -m pytest -p no:playwright "${{ steps.project.outputs.dir }}/tests"
